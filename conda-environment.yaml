  - minigrid>=3.0.0, <4
  - torch>=2.10.0, <3
  - matplotlib>=3.10.8, <4
  - seaborn>=0.13.2, <0.14
  - pyyaml>=6.0.3, <7
  - tqdm>=4.66.5, <5
  - ipykernel
