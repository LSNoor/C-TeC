name: default
channels:
- conda-forge
- nodefaults
dependencies:
- python ==3.12
- pydantic-settings >=2.13.1,<3
- pip >=26.0.1,<27
- pip
- pip:
  - --extra-index-url https://download.pytorch.org/whl/cu128
