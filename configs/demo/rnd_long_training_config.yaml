env:
  episode_length: 3000
  num_episodes: 150

hyperparameters:
  policy_lr: 2.0e-4
  critic_lr: 2.0e-4
  update_epoch: 2
  discount_factor: 0.98
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coef: 0.005
  value_coef: 0.5
  max_grad_norm: 1.0
  hidden_dim: 64
  minibatch_size: 256

c_tec:
  batch_size: 32
  contrastive_lr: 6e-4
  similarity_function: l2
  logsumexp_penalty: 0
  hidden_dim: 256
  representation_dim: 32
  gamma: 0.8
  sampling_strategy: geometric

rnd:
  predictor_lr: 5e-5
  hidden_dim: 128
  representation_dim: 128
  intrinsic_reward_coeff: 1000.0
